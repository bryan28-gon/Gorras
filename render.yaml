services:
  - type: web
    name: pos-gorras
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pos.db
      - key: SYNC_DATABASE_URL
        value: sqlite:///./pos.db
