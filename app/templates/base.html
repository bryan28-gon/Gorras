<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS en linea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Quicksand:wght@400;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg nav-custom px-3">
    <a class="navbar-brand text-white" href="/"><i class="bi bi-shop"></i> PuntoVenta</a>
    <div class="ms-auto d-flex gap-3">
        <a class="text-white" href="/inventory"><i class="bi bi-box-seam"></i> Inventario</a>
        <a class="text-white" href="/cart"><i class="bi bi-cart"></i> Carrito</a>
        <a class="text-white" href="/profile"><i class="bi bi-person"></i> Perfil</a>
        {% if user_id %}
        <a class="text-white" href="/logout"><i class="bi bi-box-arrow-left"></i> Salir</a>
        {% else %}
        <a class="text-white" href="/login">Login</a>
        <a class="text-white" href="/register">Registro</a>
        {% endif %}
    </div>
</nav>
<main class="container py-4">
    {% block content %}{% endblock %}
</main>
</body>
</html>
