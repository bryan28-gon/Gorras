{% extends "base.html" %}
{% block content %}
<h2 class="title">Inventario</h2>
<form class="d-flex gap-2 mb-3">
    <input name="q" value="{{ q }}" class="form-control" placeholder="Buscar productos">
    <button class="btn btn-warning">Buscar</button>
</form>
<form method="post" action="/inventory/add" class="card p-3 mb-4">
    <h5>Agregar producto</h5>
    <input name="name" placeholder="Nombre" class="form-control mb-2" required>
    <input name="description" placeholder="Descripcion" class="form-control mb-2" required>
    <input name="price" type="number" step="0.01" placeholder="Precio" class="form-control mb-2" required>
    <input name="stock" type="number" placeholder="Stock" class="form-control mb-2" required>
    <button class="btn btn-success"><i class="bi bi-plus-circle"></i> Agregar</button>
</form>

{% for p in products %}
<div class="card p-3 mb-3">
    <strong>{{ p.name }}</strong> - ${{ '%.2f'|format(p.price) }} - stock: {{ p.stock }}
    <small>{{ p.description }}</small>
    <div class="d-flex gap-2 mt-2">
        <form method="post" action="/inventory/edit/{{ p.id }}" class="d-flex gap-2 flex-wrap">
            <input name="name" value="{{ p.name }}" required>
            <input name="description" value="{{ p.description }}" required>
            <input name="price" type="number" step="0.01" value="{{ p.price }}" required>
            <button class="btn btn-primary btn-sm"><i class="bi bi-pencil-square"></i> Editar</button>
        </form>
        <form method="post" action="/inventory/delete/{{ p.id }}">
            <button class="btn btn-danger btn-sm"><i class="bi bi-trash"></i> Eliminar</button>
        </form>
        <form method="post" action="/inventory/decrease/{{ p.id }}" class="d-flex gap-1">
            <input name="qty" type="number" value="1" min="1" style="width:70px;">
            <button class="btn btn-warning btn-sm">Descontar</button>
        </form>
        <form method="post" action="/inventory/increase/{{ p.id }}" class="d-flex gap-1">
            <input name="qty" type="number" value="1" min="1" style="width:70px;">
            <button class="btn btn-success btn-sm">Aumentar</button>
        </form>
    </div>
</div>
{% endfor %}
{% endblock %}
